services:
  - type: web
    name: portfolio
    runtime: static
    buildCommand: ""
    staticPublishPath: public

  - type: web
    name: portfolio-alert-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ALERT_EMAIL_FROM
        sync: false
      - key: ALERT_EMAIL_TO
        sync: false
      - key: ALERT_RUN_SECRET
        sync: false

  - type: cron
    name: portfolio-alert-cron
    runtime: node
    schedule: "*/15 * * * *"
    buildCommand: npm install
    startCommand: npm run cron
    envVars:
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ALERT_EMAIL_FROM
        sync: false
      - key: ALERT_EMAIL_TO
        sync: false
